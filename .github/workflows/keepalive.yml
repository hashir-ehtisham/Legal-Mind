name: Supabase Project Keepalive

on:
  schedule:
    # Run every 3 days at 00:00 UTC
    - cron: '0 0 */3 * *'
  workflow_dispatch:
    # Allows manual runs from the GitHub Actions tab

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Send Keepalive Ping to Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Error: NEXT_PUBLIC_SUPABASE_URL or NEXT_PUBLIC_SUPABASE_ANON_KEY is not defined as a repository secret."
            exit 1
          fi
          
          # Remove trailing slash if present
          CLEAN_URL=$(echo "$SUPABASE_URL" | sed 's/\/$//')
          
          echo "Pinging Supabase REST API for database activity..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$CLEAN_URL/rest/v1/lawyers?limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          
          echo "API response status code: $response"
          
          if [ "$response" -eq 200 ] || [ "$response" -eq 204 ] || [ "$response" -eq 401 ] || [ "$response" -eq 403 ] || [ "$response" -eq 406 ]; then
            # Any of these status codes show that the project server received and processed the request (preventing pausing)
            echo "Keepalive ping completed successfully."
          else
            echo "Warning: Received unexpected HTTP code $response from Supabase."
            exit 1
          fi
